# Render Blueprint for Student Performance Predictor
# This file configures both frontend and backend services on Render

services:
  # Backend API Service
  - type: web
    name: student-performance-api
    env: python
    plan: free
    buildCommand: pip install -r student-performance/requirements.txt
    startCommand: cd student-performance/api && gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300 --keep-alive 5 "app:create_app()"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: student-performance-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://student-performance-frontend-app7.onrender.com,https://student-performance-app.onrender.com,https://student-performance-demo.onrender.com
    # Note: Disk removed - free tier doesn't support disks
    # Model files are loaded from the repository directly

  # Frontend Static Site
  - type: web
    name: student-performance-frontend
    env: static
    buildCommand: cd student-performance/frontend && npm install && npm run build
    staticPublishPath: student-performance/frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_API_URL
        value: https://student-performance-api-1xia.onrender.com/api
    # Note: Render static sites automatically handle SPA routing
    # No explicit routes needed - all paths serve index.html

databases:
  - name: student-performance-db
    plan: free
    databaseName: student_performance
    user: student_performance_user
