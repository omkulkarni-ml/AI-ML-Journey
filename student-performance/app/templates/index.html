<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
        }

        .container {
            margin-top: 100px;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        h1 {
            margin-top: 50px;
        }
    </style>
</head>

<body>

<h1>🎓 Student Performance Predictor</h1>

<div class="container">
    <form action="/predict" method="post">

        <input type="number" name="studytime" placeholder="Study Time" required><br>

        <input type="number" name="failures" placeholder="Failures" required><br>

        <input type="number" name="absences" placeholder="Absences" required><br>

        <button type="submit">Predict</button>
    </form>

    <h2>{{ prediction_text }}</h2>
</div>

</body>
</html>
